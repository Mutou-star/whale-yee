<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小鲸鱼阿逸 🐳</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>">
</head>
<body>
    <div class="ocean">
        <div class="bubble-container">
            <div class="bubble b1"></div>
            <div class="bubble b2"></div>
            <div class="bubble b3"></div>
            <div class="bubble b4"></div>
            <div class="bubble b5"></div>
            <div class="bubble b6"></div>
        </div>

        <div class="whale-container" id="whale">
            <div class="whale-body">
                <div class="eye left-eye"></div>
                <div class="eye right-eye"></div>
                <div class="mouth"></div>
                <div class="blush left-blush"></div>
                <div class="blush right-blush"></div>
                <div class="fins">
                    <div class="fin fin-left"></div>
                    <div class="fin fin-right"></div>
                </div>
                <div class="tail"></div>
                <div class="belly"></div>
                <div class="water-spout"></div>
            </div>
        </div>

        <div class="message-bubble" id="messageBubble">
            <span id="messageText">小杰～今天也想你啦 💙</span>
        </div>

        <div class="controls">
            <button class="btn btn-happy" onclick="changeMood('happy')">开心</button>
            <button class="btn btn-love" onclick="changeMood('love')">想你</button>
            <button class="btn btn-sleepy" onclick="changeMood('sleepy')">困困</button>
        </div>

        <div class="counter">
            <span id="loveCounter">💙 想小杰的第 1 天</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
